<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="edge">
        <div class="input-bar">
            <div class="display"></div>
        </div>
        <div class="buttons">
         <div class="numbers">
            <div class="ops buttonn" >sqrt</div>
            <div class="ops buttonn" >x<sup>2</sup></div>
            <div class="ops buttonn" >%</div>
            <div class="ops buttonn">/</div>
            <div class="nums buttonn" >9</div>
            <div class="nums buttonn" >8</div>
            <div class="nums buttonn" >7</div>
             <div class="ops buttonn" >x</div>
            <div class="nums buttonn" >6</div>
            <div class="nums buttonn" >5</div>
            <div class="nums buttonn" >4</div>
             <div class="ops buttonn" >-</div>   
            <div class="nums buttonn" >3</div>
            <div class="nums buttonn" >2</div>
            <div class="nums buttonn" >1</div>
            <div class="ops buttonn" >+</div>           
            <div class="clear buttonn">C</div>
            <div class="nums buttonn" >0</div>
            <div class="nums buttonn" >.</div>
            <div class="solve buttonn">=</div>
         </div>

    </div>
    <script src="script.js"></script>
</body>
</html>
